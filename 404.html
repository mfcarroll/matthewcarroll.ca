<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Matthew Carroll</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark")
          document.documentElement.dataset.theme = t;
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Alas, Error CDIV!</h1>
        <p class="tagline">
          To load, or not to load, that is the question:<br />
          Whether 'tis nobler in the mind to suffer<br />
          The slings and arrows of broken hyperlinks,<br />
          Or to take arms against a sea of server errors,<br />
          And by refreshing, end them?
        </p>
        <p><em>Exit User, pursued by a server timeout.</em></p>
      </header>
      <p><a href="/">← Back to matthewcarroll.ca</a></p>
    </main>
  </body>
</html>
